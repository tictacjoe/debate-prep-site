<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="A sourced record of corporate deregulation, cabinet-level legal exposure, government service redirection, and daily reporting. Type a claim and see exactly what's documented — every entry sourced, nothing asserted without a citation.">
<title>Claim Check</title>
<style>
  :root {
    --paper: #EDEFE7;
    --paper-card: #F7F8F2;
    --ink: #1D2220;
    --ink-soft: #52564F;
    --ink-faint: #8A8D82;
    --rule: #C7CABB;
    --rule-strong: #A9AC9A;
    --verified: #2F5233;
    --verified-bg: #E3EBDF;
    --flag: #8B3A2B;
    --flag-bg: #F3E4DF;
    --brass: #96762C;
    --brass-light: #EFE7D2;
    --highlight: #F2D98D;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: Georgia, 'Iowan Old Style', 'Times New Roman', serif;
    line-height: 1.55;
  }

  .mono {
    font-family: ui-monospace, 'SF Mono', 'Courier New', Courier, monospace;
  }

  /* ================= MASTHEAD ================= */
  header.masthead {
    max-width: 880px;
    margin: 0 auto;
    padding: 3rem 1.5rem 1.5rem;
    text-align: center;
    border-bottom: 3px double var(--rule-strong);
  }
  header.masthead h1 {
    margin: 0;
    font-size: 2.6rem;
    letter-spacing: 0.06em;
    font-weight: 400;
    text-transform: uppercase;
  }
  header.masthead .tagline {
    margin: 0.6rem 0 0;
    font-size: 0.85rem;
    letter-spacing: 0.03em;
    color: var(--brass);
    font-style: italic;
  }
  header.masthead .subhead {
    margin: 1rem auto 0;
    max-width: 560px;
    font-size: 0.95rem;
    color: var(--ink-soft);
  }

  /* ================= GLOBAL SEARCH (primary interaction) ================= */
  .global-search-box {
    max-width: 700px;
    margin: 2rem auto 0;
    display: flex;
    align-items: center;
    gap: 0.9rem;
    background: var(--paper-card);
    border: 2px solid var(--brass);
    border-radius: 6px;
    padding: 0.9rem 1.1rem;
    box-shadow: 0 2px 10px rgba(29, 34, 32, 0.08);
  }
  .global-search-box .search-icon {
    font-size: 1.1rem;
    color: var(--brass);
    flex-shrink: 0;
  }
  .global-search-box input[type="text"] {
    flex: 1;
    border: none;
    background: transparent;
    font-family: ui-monospace, 'SF Mono', 'Courier New', monospace;
    font-size: 1.05rem;
    color: var(--ink);
    outline: none;
  }
  .global-search-box input[type="text"]::placeholder { color: var(--ink-faint); }
  .browse-instead {
    max-width: 700px;
    margin: 1.75rem auto 0;
    text-align: center;
    font-family: ui-monospace, monospace;
    font-size: 0.72rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--ink-faint);
  }

  /* ================= NAV ACTIONS (floating) ================= */
  .nav-actions {
    position: fixed;
    right: 1.25rem;
    bottom: 1.25rem;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    z-index: 100;
  }
  .nav-action-btn {
    font-family: ui-monospace, monospace;
    font-size: 0.72rem;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    background: var(--paper-card);
    color: var(--ink-soft);
    border: 1px solid var(--rule-strong);
    padding: 0.5rem 0.9rem;
    border-radius: 4px;
    cursor: pointer;
    box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    display: flex;
    align-items: center;
    gap: 0.4rem;
    white-space: nowrap;
  }
  .nav-action-btn:hover { background: var(--brass); color: var(--paper-card); border-color: var(--brass); }

  @media (max-width: 600px) {
    .nav-actions { right: 0.75rem; bottom: 0.75rem; }
    .nav-action-btn { padding: 0.45rem 0.7rem; font-size: 0.68rem; }
  }

  .regex-toggle {
    font-family: ui-monospace, monospace;
    font-size: 0.72rem;
    color: var(--brass);
    display: flex;
    align-items: center;
    gap: 0.3rem;
    white-space: nowrap;
    cursor: pointer;
  }
  .regex-toggle input { cursor: pointer; }
  .regex-error {
    max-width: 700px;
    margin: 0.5rem auto 0;
    font-family: ui-monospace, monospace;
    font-size: 0.75rem;
    color: var(--flag);
    text-align: center;
  }
  .source-tag {
    display: inline-block;
    padding: 0.1rem 0.5rem;
    border-radius: 2px;
    font-size: 0.66rem;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    background: var(--brass-light);
    color: var(--brass);
    margin-right: 0.5rem;
  }

  /* ================= REPORTING LINK (global search) ================= */
  .reporting-link {
    margin: 0 0 1.25rem;
    padding: 0.6rem 1rem;
    background: var(--brass-light);
    border: 1px solid var(--brass);
    border-radius: 4px;
    text-align: center;
    font-family: ui-monospace, monospace;
    font-size: 0.8rem;
    color: var(--ink-soft);
  }
  .reporting-link a {
    color: var(--brass);
    font-weight: bold;
    text-decoration: underline;
    cursor: pointer;
  }
  .reporting-link a:hover { opacity: 0.8; }

  /* ================= ONE-LINER ROWS ================= */
  .oneliner-row {
    display: flex;
    align-items: baseline;
    gap: 0.6rem;
    padding: 0.55rem 0.8rem;
    border-bottom: 1px solid var(--rule);
    cursor: pointer;
    font-size: 0.92rem;
  }
  .oneliner-row:hover { background: var(--brass-light); }
  .oneliner-row:last-child { border-bottom: none; }
  .oneliner-caret {
    font-family: ui-monospace, monospace;
    font-size: 0.7rem;
    color: var(--brass);
    flex-shrink: 0;
    transition: transform 0.15s ease;
  }
  .oneliner-row.open .oneliner-caret { transform: rotate(90deg); }
  .oneliner-text { flex: 1; }
  .oneliner-detail {
    display: none;
    padding: 0 1.25rem 1rem 2.4rem;
    border-bottom: 1px solid var(--rule);
    background: var(--paper);
  }
  .oneliner-row.open + .oneliner-detail { display: block; }
  .oneliner-list {
    border: 1px solid var(--rule-strong);
    border-radius: 4px;
    background: var(--paper);
    overflow: hidden;
  }
  mark.hl {
    background: var(--highlight);
    color: var(--ink);
    font-weight: bold;
    padding: 0 0.15em;
    border-radius: 2px;
  }

  /* ================= TABS ================= */
  nav.tabs {
    max-width: 880px;
    margin: 0 auto;
    padding: 0 1.5rem;
    display: flex;
    gap: 4px;
    margin-top: -1px;
  }
  nav.tabs button {
    font-family: ui-monospace, 'SF Mono', 'Courier New', monospace;
    font-size: 0.78rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    background: var(--rule);
    color: var(--ink-soft);
    border: none;
    padding: 0.6rem 1.1rem 0.5rem;
    cursor: pointer;
    border-radius: 6px 6px 0 0;
    position: relative;
    top: 1px;
  }
  nav.tabs button.active {
    background: var(--paper-card);
    color: var(--ink);
    font-weight: bold;
  }
  nav.tabs button:hover:not(.active) {
    background: var(--rule-strong);
  }

  /* ================= MAIN ================= */
  main {
    max-width: 880px;
    margin: 0 auto;
    background: var(--paper-card);
    padding: 1.75rem 1.5rem 3rem;
    min-height: 400px;
  }

  .controls {
    display: flex;
    gap: 0.75rem;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }
  .controls input[type="text"] {
    flex: 1;
    min-width: 200px;
    font-family: Georgia, serif;
    font-size: 0.95rem;
    padding: 0.55rem 0.8rem;
    border: 1px solid var(--rule-strong);
    background: var(--paper);
    color: var(--ink);
    border-radius: 3px;
  }
  .controls select {
    font-family: ui-monospace, monospace;
    font-size: 0.8rem;
    padding: 0.55rem 0.6rem;
    border: 1px solid var(--rule-strong);
    background: var(--paper);
    color: var(--ink);
    border-radius: 3px;
  }

  .result-count {
    font-family: ui-monospace, monospace;
    font-size: 0.75rem;
    color: var(--ink-faint);
    margin-bottom: 1rem;
    letter-spacing: 0.03em;
  }

  /* ================= ENTRY CARD ================= */
  .entry {
    position: relative;
    border: 1px solid var(--rule-strong);
    border-radius: 4px;
    margin-bottom: 1rem;
    background: var(--paper);
    overflow: hidden;
  }
  .entry-head {
    display: flex;
    align-items: flex-start;
    gap: 1rem;
    padding: 0.9rem 3.6rem 0.9rem 1rem;
    cursor: pointer;
  }
  .entry-head:hover { background: var(--brass-light); }

  .docket-no {
    font-family: ui-monospace, monospace;
    font-size: 0.72rem;
    color: var(--ink-faint);
    white-space: nowrap;
    padding-top: 0.2rem;
    min-width: 3.2rem;
  }
  .entry-title-block { flex: 1; }
  .entry-title {
    margin: 0 0 0.25rem;
    font-size: 1.05rem;
    font-weight: bold;
  }
  .entry-meta {
    font-family: ui-monospace, monospace;
    font-size: 0.7rem;
    color: var(--ink-faint);
    display: flex;
    gap: 0.6rem;
    flex-wrap: wrap;
    align-items: center;
  }
  .entry-meta span:not(:first-child):not(.domain-tag):not(.source-tag) {
    position: relative;
    padding-left: 0.75rem;
  }
  .entry-meta span:not(:first-child):not(.domain-tag):not(.source-tag)::before {
    content: "•";
    position: absolute;
    left: 0;
    color: var(--rule-strong);
  }
  .domain-tag {
    display: inline-block;
    padding: 0.1rem 0.5rem;
    border-radius: 2px;
    font-size: 0.68rem;
    letter-spacing: 0.02em;
  }

  /* ---- signature element: rotated ink stamp ---- */
  .stamp {
    position: absolute;
    top: 0.7rem;
    right: 0.9rem;
    transform: rotate(-7deg);
    border: 2px solid;
    border-radius: 4px;
    padding: 0.15rem 0.5rem;
    font-family: ui-monospace, monospace;
    font-size: 0.62rem;
    font-weight: bold;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    opacity: 0.88;
  }
  .stamp.verified { color: var(--verified); border-color: var(--verified); }
  .stamp.flag { color: var(--flag); border-color: var(--flag); }

  .entry-detail {
    display: none;
    padding: 0 1.25rem 1.25rem;
    border-top: 1px dashed var(--rule-strong);
  }
  .entry.open .entry-detail { display: block; }
  .entry.open .entry-head { background: var(--brass-light); }

  .field-label {
    font-family: ui-monospace, monospace;
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--brass);
    margin: 1rem 0 0.3rem;
  }
  .field-label:first-child { margin-top: 1rem; }
  .field-value { font-size: 0.92rem; }
  .field-summary {
    font-weight: 700;
    margin: 0 0 0.35rem;
  }

  .exhibit-list {
    list-style: none;
    margin: 0;
    padding: 0;
    font-size: 0.85rem;
  }
  .exhibit-list li {
    padding: 0.3rem 0;
    border-bottom: 1px solid var(--rule);
  }
  .exhibit-list li:last-child { border-bottom: none; }
  .exhibit-list a { color: var(--brass); text-decoration: none; }
  .exhibit-list a:hover { text-decoration: underline; }

  .confidence-box {
    background: var(--brass-light);
    border-left: 3px solid var(--brass);
    border-radius: 0 3px 3px 0;
    padding: 0.6rem 0.8rem;
    font-size: 0.85rem;
    font-style: italic;
  }

  .empty-state {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--ink-faint);
    font-style: italic;
  }

  @media (max-width: 600px) {
    header.masthead h1 { font-size: 1.9rem; }
    .entry-head { flex-direction: column; gap: 0.3rem; padding-right: 1rem; }
    .stamp { position: static; transform: rotate(-3deg); display: inline-block; margin-top: 0.4rem; }
  }
</style>
</head>
<body>

<header class="masthead">
  <h1>Claim Check</h1>
  <p class="subhead">Claim Check data is sourced and built to hold up when challenged. Enter a keyword, statement, or topic — or browse by database. Every entry backed by a verifiable citation.</p>
  <div class="global-search-box" id="search-mode-box">
    <span class="search-icon">🔍</span>
    <input type="text" id="global-search" placeholder="Search everything — try &quot;EPA&quot;, &quot;Supreme Court&quot;, or a name...">
    <label class="regex-toggle"><input type="checkbox" id="global-oneliner"> 1-liners</label>
    <label class="regex-toggle"><input type="checkbox" id="global-regex"> regex</label>
  </div>

  <div class="regex-error" id="regex-error"></div>
</header>

<div class="nav-actions">
  <button id="back-to-top-btn" class="nav-action-btn" type="button" title="Scroll to the top of the page">↑ Back to Top</button>
  <button id="start-over-btn" class="nav-action-btn" type="button" title="Clear search/filters and return to the default view">↻ Start Over</button>
</div>

<p class="browse-instead" id="browse-instead">— search or browse by database —</p>

<nav class="tabs" id="tabs"></nav>

<main>
  <div class="controls" id="tab-controls">
    <input type="text" id="search" placeholder="Search entries...">
    <select id="filter"></select>
  </div>
  <div class="result-count" id="count"></div>
  <div id="entries"></div>
</main>

<script>
/* ====================================================================
   REAL DATA LOADING
   Fetches the three published JSON files (same-origin relative paths,
   so this works once deployed via GitHub Pages -- see loadAllData()
   near the bottom of this script). Each tracker starts empty and is
   populated asynchronously.
==================================================================== */

const TRACKERS = {
  deregulation: {
    label: "Corporate Deregulation",
    data: [],
    titleField: "rule_name",
    idField: "id",
    dateField: "date_of_action",
    filterField: "domain",
    filterLabel: "domain",
    statusField: "status",
    kind: "deregulation",
  },
  prosecution: {
    label: "Cabinet-Level Legal Exposure",
    data: [],
    titleField: "official",
    idField: "official",
    dateField: "last_updated",
    filterField: "status_category",
    filterLabel: "status",
    statusField: "status",
    kind: "prosecution",
  },
  govservices: {
    label: "Government Service Redirection",
    data: [],
    titleField: "title",
    idField: "id",
    dateField: "date_of_action",
    filterField: "domain",
    filterLabel: "domain",
    statusField: "status",
    kind: "govservices",
  },
  tracker: {
    label: "Reporting",
    data: [],
    titleField: "what_happened",
    idField: null,
    dateField: "date",
    filterField: null,
    filterLabel: null,
    statusField: null,
    kind: "tracker",
  }
};

/* Converts raw scraped posts (one JSON object per Substack post, each
   containing multiple dated entries) into a flat list of individually
   searchable pseudo-entries -- one per event, not one per post. */
function flattenTrackerPosts(posts) {
  const flat = [];
  (posts || []).forEach(post => {
    (post.entries || []).forEach(entry => {
      flat.push({
        date: entry.date || post.date,
        category: entry.category || post.category || "Uncategorized",
        what_happened: entry.what_happened || "",
        why_it_matters: entry.why_it_matters || "",
        source_name: entry.source_name || null,
        source_url: entry.source_url || null,
        post_title: post.title || "",
      });
    });
  });
  return flat;
}

let activeTracker = "deregulation";
let searchTerm = "";
let filterValue = "";

function stampClass(entry, cfg) {
  if (cfg.kind === "deregulation") {
    const s = (entry.status || "").toLowerCase();
    if (s.includes("proposed") || s.includes("delayed") || s.includes("paused")) return "flag";
    return "verified";
  }
  if (cfg.kind === "tracker") {
    return entry.source_name ? "verified" : "flag";
  }
  return entry.contested ? "flag" : "verified";
}

function stampLabel(entry, cfg) {
  if (cfg.kind === "deregulation") {
    const s = (entry.status || "");
    if (s.toLowerCase().includes("proposed")) return "Proposed";
    if (s.toLowerCase().includes("delayed") || s.toLowerCase().includes("paused")) return "Paused";
    return "Verified";
  }
  if (cfg.kind === "tracker") {
    return entry.source_name ? "Sourced" : "Uncited";
  }
  return entry.contested ? "Contested" : "Documented";
}

function domainColor(domain) {
  const map = {
    environmental: "#4B6B4F", labor: "#3E5C76", financial: "#8B6F3E",
    consumer_safety: "#7A4B3E", "cross-cutting": "#5C5A52",
    research_suppression: "#6B4B7A", funding_redirection: "#8B6F3E",
    staff_office_cuts: "#3E5C76", data_collection_halted: "#7A4B3E"
  };
  return map[domain] || "#5C5A52";
}

/* govservices domain values are snake_case in the data
   (research_suppression, funding_redirection, staff_office_cuts,
   data_collection_halted) -- this converts them to a readable label
   for the filter dropdown and card meta line. */
function govservicesDomainLabel(domain) {
  const map = {
    research_suppression: "Research Suppression",
    funding_redirection: "Funding Redirection",
    staff_office_cuts: "Staff/Office Cuts",
    data_collection_halted: "Data Collection Halted"
  };
  return map[domain] || domain;
}

/* Extracts the first YYYY-MM or YYYY-MM-DD substring from a date
   string and returns a sortable integer (YYYYMMDD, or YYYYMM01 if no
   day given). Needed because Government Service Redirection entries
   often have compound date_of_action strings like "2025-03 (initial
   cuts) through 2026-04 (ongoing)" -- native Date.parse returns NaN
   on the whole string in that case, so this pulls out just the
   leading date pattern instead. Returns 0 if no date pattern is found
   at all (e.g. "Structural decline since 2013" with no YYYY-MM),
   which sorts such entries as oldest -- a reasonable default for
   entries describing a chronic condition rather than a datable event. */
function extractFirstDate(str) {
  if (!str) return 0;
  const isoMatch = String(str).match(/(\d{4})-(\d{2})(?:-(\d{2}))?/);
  if (isoMatch) {
    const year = parseInt(isoMatch[1], 10);
    const month = parseInt(isoMatch[2], 10);
    const day = isoMatch[3] ? parseInt(isoMatch[3], 10) : 1;
    return year * 10000 + month * 100 + day;
  }
  // Fallback: a bare 4-digit year with no month/day precision -- e.g.
  // "Staff departures throughout 2025" or "Structural decline since
  // 2013" have no ISO date pattern at all, but a bare year is still
  // far more useful for ordering than falling back to 0 for every
  // such entry (which would incorrectly group them all as "oldest").
  const yearMatch = String(str).match(/\b(19|20)\d{2}\b/);
  if (yearMatch) return parseInt(yearMatch[0], 10) * 10000 + 101;
  return 0;
}

function truncate(str, n) {
  if (!str) return "";
  return str.length > n ? str.slice(0, n).trim() + "…" : str;
}

/* Extracts the largest numeric value found in a string like
   "$300,000,000/year" or "2,577 mortalities" -- used to compare
   quantified impact figures that come in wildly different units. */
function extractLargestNumber(str) {
  if (!str) return 0;
  const text = String(str);
  // Match a number optionally followed by a magnitude word (million/
  // billion/trillion) so "$495 million" is correctly read as
  // 495,000,000 rather than just 495 -- without this, a figure
  // written in word-suffix form could lose a "largest figure"
  // comparison to a smaller number written out in full digits.
  const re = /([\d,]+\.?\d*)\s*(million|billion|trillion)?/gi;
  const multiplier = { million: 1e6, billion: 1e9, trillion: 1e12 };
  let maxVal = 0;
  let match;
  while ((match = re.exec(text)) !== null) {
    const raw = parseFloat(match[1].replace(/,/g, ""));
    if (isNaN(raw)) continue;
    const mult = match[2] ? multiplier[match[2].toLowerCase()] : 1;
    maxVal = Math.max(maxVal, raw * mult);
  }
  return maxVal;
}

/* Impact scoring is inherently a heuristic, not an objective measure
   -- "impact" means genuinely different things across three different
   schemas. Each kind uses whatever structured signal it actually has:

   - deregulation: log-scaled magnitude of the largest quantified
     figure (dollars, mortality counts), since these entries carry
     real numbers that are otherwise hard to compare (a $300M/year
     figure vs. a 2,577-mortality figure are different units, but log
     scale keeps huge dollar amounts from always dominating raw counts)
   - prosecution: confidence tier (HIGH > MODERATE > LOW), since that's
     the only structured strength signal these entries carry; no
     quantified figures exist in this schema at all
   - tracker/News: recency, since there's no other signal available

   The score is shown to the user, not hidden -- consistent with the
   whole project's "know the cause" transparency standard. */
function impactScore(entry, cfg) {
  if (cfg.kind === "deregulation") {
    const figs = entry.estimated_health_impact?.figures || [];
    let maxNum = 0;
    figs.forEach(f => { maxNum = Math.max(maxNum, extractLargestNumber(f.value)); });
    const magnitudeScore = maxNum > 0 ? Math.log10(maxNum + 1) : 0;
    const hasFiguresBonus = figs.length > 0 ? 2 : 0;
    return Math.round((magnitudeScore + hasFiguresBonus) * 10) / 10;
  }
  if (cfg.kind === "prosecution") {
    const tier = String(entry.confidence_note || "").toUpperCase();
    let tierScore = 0;
    if (tier.startsWith("HIGH")) tierScore = 10;
    else if (tier.startsWith("MODERATE-HIGH")) tierScore = 8;
    else if (tier.startsWith("MODERATE-LOW")) tierScore = 5;
    else if (tier.startsWith("MODERATE")) tierScore = 6.5;
    else if (tier.startsWith("LOW-MODERATE")) tierScore = 4;
    else if (tier.startsWith("LOW")) tierScore = 2;
    const contestedBonus = entry.contested ? 1 : 0;
    return tierScore + contestedBonus;
  }
  if (cfg.kind === "tracker") {
    const d = entry.date ? Date.parse(entry.date) : 0;
    if (!d) return 0;
    // Scaled to roughly the same 0-11 range as the other trackers'
    // magnitude/confidence scores (was previously raw "years since
    // epoch", ~56, which swamped every other tracker's score whenever
    // results were merged and sorted together across trackers). Still
    // a straight linear function of date, so recency ordering within
    // this tracker alone is unchanged.
    const daysAgo = (Date.now() - d) / (1000 * 60 * 60 * 24);
    return 11 - daysAgo / 30;
  }
  if (cfg.kind === "govservices") {
    const figs = entry.estimated_impact?.figures || [];
    let maxNum = 0;
    figs.forEach(f => { maxNum = Math.max(maxNum, extractLargestNumber(f.value)); });
    const magnitudeScore = maxNum > 0 ? Math.log10(maxNum + 1) : 0;
    const hasFiguresBonus = figs.length > 0 ? 2 : 0;
    return Math.round((magnitudeScore + hasFiguresBonus) * 10) / 10;
  }
  return 0;
}

/* Human-readable label for why something scored the way it did --
   shown alongside results in impact-sort mode so the ranking isn't
   a black box. */
function impactScoreLabel(entry, cfg) {
  if (cfg.kind === "deregulation") {
    const figs = entry.estimated_health_impact?.figures || [];
    if (!figs.length) return "no quantified figures";
    const top = figs.reduce((a, b) => extractLargestNumber(b.value) > extractLargestNumber(a.value) ? b : a);
    return "largest figure: " + top.value;
  }
  if (cfg.kind === "prosecution") {
    const tier = String(entry.confidence_note || "").split(" ")[0].replace(/[:-]$/, "");
    return "confidence tier: " + (tier || "unstated") + (entry.contested ? " (contested)" : "");
  }
  if (cfg.kind === "tracker") {
    return "dated " + (entry.date || "unknown");
  }
  if (cfg.kind === "govservices") {
    const figs = entry.estimated_impact?.figures || [];
    if (!figs.length) return "no quantified figures";
    const top = figs.reduce((a, b) => extractLargestNumber(b.value) > extractLargestNumber(a.value) ? b : a);
    return "largest figure: " + top.value;
  }
  return "";
}

/* Canonical category set for the News/tracker database. The real
   scraped data has format drift across ~500 days of posts (e.g.
   "Imperial" / "Imperial and Geopolitical" / "Imperial Watch and
   Geopolitical" are the same underlying category at different points
   in time) plus two known scraper bugs -- stray internal link markers
   leaking into the category field, and a small number of entries
   where an article headline got stored as the category instead of a
   real one. This map absorbs all of that so the filter dropdown stays
   a small, curated, meaningful list rather than dozens of near-
   duplicate or junk one-off values. */
const CATEGORY_CANONICAL_MAP = {
  "corruption": "Corruption",
  "power consolidation": "Power Consolidation",
  "weaponization of institutions": "Weaponization of Institutions",
  "media suppression and authoritarian tactics": "Media Suppression",
  "media suppression": "Media Suppression",
  "human and civil rights abuses": "Human & Civil Rights",
  "human and civil rights": "Human & Civil Rights",
  "government services disruption and collapse": "Government Services Disruption",
  "government collapse": "Government Services Disruption",
  "government services disruption": "Government Services Disruption",
  "imperial": "Imperial & Geopolitical",
  "imperial watch and geopolitical": "Imperial & Geopolitical",
  "imperial and geopolitical": "Imperial & Geopolitical",
  "geopolitical chaos": "Imperial & Geopolitical",
  "far-right & russian influence": "Far-Right & Russian Influence",
  "far-right and russian influence": "Far-Right & Russian Influence",
  "trump economic downturn": "Economic Downturn",
  "resistance": "Resistance",
  "resilience and resistance": "Resistance",
  "propaganda": "Propaganda",
  "disinformation": "Disinformation",
  "supreme court": "Supreme Court",
  "white supremacist": "White Supremacist",
  "announcement": "Announcement",
  "other": "Other",
  "other alarming": "Other",
  "other things to keep an eye on": "Other",
};

const CANONICAL_CATEGORY_ORDER = [
  "Corruption", "Power Consolidation", "Weaponization of Institutions",
  "Media Suppression", "Human & Civil Rights", "Government Services Disruption",
  "Imperial & Geopolitical", "Far-Right & Russian Influence", "Economic Downturn",
  "Resistance", "Propaganda", "Disinformation", "Supreme Court"
];

/* Normalizes one raw scraped category value. Handles known scraper
   bugs defensively (in addition to being fixed at the source in
   parse_post.py):
   1. Stray "\x00LINK:...\x00 In <category>" marker leakage -- the
      real category is recovered from the text after "In ".
   2. Anything that doesn't match a known category (most commonly an
      article headline mistakenly stored as the category) falls to
      "Uncategorized" rather than polluting the filter with one-off
      junk values. */
function normalizeCategory(raw) {
  if (!raw) return "Uncategorized";
  let cleaned = raw;

  const linkLeakMatch = cleaned.match(/\u0000LINK:[^\u0000]*\u0000\s*(?:In\s+)?(.+)$/i);
  if (linkLeakMatch) cleaned = linkLeakMatch[1];

  const key = cleaned.trim().toLowerCase();
  return CATEGORY_CANONICAL_MAP[key] || "Uncategorized";
}

/* Prosecution's offense_category field is a full legal-analysis
   paragraph per entry, not a short reusable label -- each one is
   essentially unique. This classifies the raw text into a small,
   curated set of short category names by keyword, deliberately
   WITHOUT the specific statute/section citation in the short label
   (e.g. "Hatch Act Violation", not "Hatch Act Violation (5 U.S.C.
   §7323)") -- the full citation and legal analysis stays visible in
   the expanded detail view via offense_category_raw. Order matters:
   checked roughly in the sequence each concept tends to be the
   PRIMARY violation named in these entries; first match wins. */
function classifyOffenseCategory(raw) {
  if (!raw) return "Uncategorized";
  const text = raw.toLowerCase();

  const rules = [
    [/vindictive|selective prosecution/, "Selective/Vindictive Prosecution"],
    [/appointments clause/, "Appointments Clause Violation"],
    [/hatch act/, "Hatch Act Violation"],
    [/administrative procedure act|arbitrary and capricious/, "APA Violation"],
    [/federal advisory committee act|\bfaca\b/, "FACA / Transparency Violation"],
    [/impoundment control act/, "Impoundment Control Act Violation"],
    [/federal vacancies reform act|\bfvra\b/, "Vacancies Act Violation"],
    [/establishment clause/, "Establishment Clause Violation"],
    [/criminal contempt|contempt of court/, "Contempt of Court"],
    [/war crime|law of armed conflict|geneva convention|hors de combat/, "War Crimes / Law of Armed Conflict"],
    [/dod instruction|nonpublic dod information|793\(f\)|national defense information/, "Mishandling Sensitive Information"],
    [/conflict of interest|recusal/, "Conflict of Interest"],
    [/ultra vires/, "Ultra Vires Agency Action"],
    [/commemorative works act|unauthorized construction/, "Unauthorized Federal Construction"],
    [/polling places|18 u\.s\.c\. §592/, "Election-Related Statutory Violation"],
    [/confidential financial data|grand jury material|unauthorized disclosure/, "Misuse of Confidential Data"],
    [/politicization of intelligence|tradecraft/, "Intelligence Politicization"],
    [/first amendment/, "First Amendment Retaliation"],
    [/unlawful agency action/, "Unlawful Agency Action"],
  ];

  for (const [pattern, label] of rules) {
    if (pattern.test(text)) return label;
  }
  return "Other/Unclassified";
}

/* Prosecution's real filtering need is procedural STAGE, not
   violation type -- almost every entry says "no criminal charges"
   (none of these 28 are criminally charged), so charge-status itself
   isn't a useful filter dimension. What actually varies and matters
   is where each matter stands procedurally: has a court ruled, is
   there an active congressional investigation, was it dismissed,
   etc. Tested against all 28 real status strings; ordered from most
   to least procedurally resolved so the strongest applicable finding
   wins when a status touches multiple stages. */
function classifyStatus(raw) {
  if (!raw) return "Uncategorized";
  const text = raw.toLowerCase();

  const rules = [
    [/impeachment articles/, "Impeachment Articles Filed"],
    [/dismissed by a federal judge|prosecution dismissed/, "Case Dismissed"],
    [/probable cause.*contempt|criminal contempt/, "Contempt Finding"],
    [/ruled against|ruled on the merits|court has blocked|court has ruled|ordered reversal|has ruled\b/, "Court Ruled Against the Agency"],
    [/\bgao\b/, "GAO Investigation / Finding"],
    [/inspector general|found by ig\b/, "Inspector General Finding"],
    [/foia lawsuit|foia litigation/, "FOIA Litigation Ongoing"],
    [/withdrawn|abandoned rule|mooted/, "Withdrawn / Mooted"],
    [/congressional investigation|senate judiciary inquiry|congressional requests for investigation|bipartisan congressional investigation/, "Congressional Investigation Ongoing"],
    [/complaint filed|complaint.*pending/, "Administrative Complaint Filed"],
    [/ongoing court inquiry/, "Ongoing Court Inquiry"],
    [/active litigation|active federal litigation|litigation[^;]{0,60}\b(is|remains)\s+ongoing\b|litigation\/arbitration|litigation.*proceeded/, "Active Litigation — Pending Ruling"],
    [/should be treated as incomplete|revisited with deeper research/, "Needs Further Research"],
    [/no formal action|no formal.*(finding|violation)|no legal challenge|no.*complaint.*identified|no litigation identified|no.*investigation.*identified|no completed deployment/, "No Formal Action Taken"],
  ];

  for (const [pattern, label] of rules) {
    if (pattern.test(text)) return label;
  }
  return "Other/Unclassified";
}

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

/* summary-line:start */
function summaryLineHtml(summary) {
  return summary ? '<p class="field-summary">' + summary + '</p>' : '';
}
/* summary-line:end */

function escapeRegExp(str) {
  return str.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
}

/* Escapes the text first (so entry data can never inject stray HTML),
   then wraps matches of the search term in <mark>. In plain-text mode
   the term itself is regex-escaped so special characters like "?" or
   "(" are matched literally, not as regex syntax -- only in regex
   mode does the term act as an actual pattern. */
function highlightMatches(text, term, useRegex) {
  const escaped = escapeHtml(text);
  if (!term) return escaped;
  try {
    const pattern = useRegex ? term : escapeRegExp(term);
    const re = new RegExp(pattern, "gi");
    return escaped.replace(re, (match) => "<mark class=\"hl\">" + match + "</mark>");
  } catch (err) {
    return escaped; // invalid regex -- matchesTerm() upstream already surfaces the error banner
  }
}

/* One-liner generation is deliberately template-based rather than
   free-text, so it stays deterministic and traceable back to the
   same structured fields as the full card -- no separate "summary"
   field to keep in sync, no LLM call needed client-side. */
function oneLinerFor(entry, cfg) {
  if (cfg.kind === "deregulation") {
    const s = (entry.status || "").toLowerCase();
    let verb = "acted on";
    if (s.includes("fully repealed")) verb = "repealed";
    else if (s.includes("proposed")) verb = "proposed repealing";
    else if (s.includes("delayed") || s.includes("paused")) verb = "paused enforcement of";
    const proponent = entry.primary_proponent?.name || entry.agency || "An agency";
    let line = proponent + " (" + (entry.agency || "") + ") " + verb + " \u201c" + entry.rule_name + "\u201d";
    const figs = entry.estimated_health_impact?.figures;
    if (figs && figs.length) {
      line += " \u2014 " + figs[0].metric + ": " + figs[0].value + ".";
    } else {
      line += " (" + (entry.date_of_action || entry.administration || "") + ").";
    }
    return line;
  }
  if (cfg.kind === "prosecution") {
    const tag = entry.contested ? " [CONTESTED]" : "";
    return entry.official + " \u2014 " + entry.status_category + ": " + entry.offense_category + tag;
  }
  if (cfg.kind === "tracker") {
    return (entry.date || "") + " " + truncate(entry.what_happened, 150);
  }
  if (cfg.kind === "govservices") {
    const figs = entry.estimated_impact?.figures || [];
    let line = (entry.institution || "") + " \u2014 " + (entry.title || "");
    if (figs.length) {
      const top = figs.reduce((a, b) => extractLargestNumber(b.value) > extractLargestNumber(a.value) ? b : a);
      line += " (" + top.metric + ": " + top.value + ")";
    }
    return line;
  }
  return JSON.stringify(entry).slice(0, 150);
}

/* Matches a search term against a haystack string. Supports plain
   substring (case-insensitive) or regex mode. On invalid regex,
   returns null so the caller can show an error rather than silently
   falling back to a different match behavior. */
function matchesTerm(haystack, term, useRegex) {
  if (!term) return true;
  if (useRegex) {
    try {
      const re = new RegExp(term, "i");
      return re.test(haystack);
    } catch (err) {
      return null; // signals invalid regex to the caller
    }
  }
  return haystack.toLowerCase().includes(term.toLowerCase());
}

/* Shared detail-html builder -- used both by the full docket card
   (tabbed/global card view) and by the one-liner expand-on-click,
   so there's exactly one place that knows how to render each
   tracker kind's fields, not two drifting copies. */
function buildDetailHtml(entry, cfg) {
  if (cfg.kind === "deregulation") {
    return '<div class="field-label">What changed</div><div class="field-value">' + (entry.what_changed || "") + '</div>' +
      '<div class="field-label">Primary proponent</div><div class="field-value"><strong>' + (entry.primary_proponent?.name || "") + '</strong> — ' + (entry.primary_proponent?.role || "") + (entry.primary_proponent?.note ? '<br><em>' + entry.primary_proponent.note + '</em>' : '') + '</div>' +
      '<div class="field-label">Estimated impact</div><div class="field-value">' + (entry.estimated_health_impact?.summary || "") + '</div>' +
      (entry.estimated_health_impact?.figures?.length ? '<ul class="exhibit-list">' + entry.estimated_health_impact.figures.map(f => '<li>' + f.metric + ': <strong>' + f.value + '</strong> (' + f.source + ')</li>').join("") + '</ul>' : '') +
      '<div class="field-label">Confidence note</div><div class="confidence-box">' + (entry.confidence_note || "") + '</div>' +
      '<div class="field-label">Sources</div><ul class="exhibit-list">' + (entry.sources || []).map(s => '<li><a href="' + s.url + '" target="_blank" rel="noopener">' + s.name + '</a></li>').join("") + '</ul>';
  }
  if (cfg.kind === "tracker") {
    return '<div class="field-label">What happened</div><div class="field-value">' + (entry.what_happened || "") + '</div>' +
      (entry.source_name ? '<div class="field-label">Source</div><ul class="exhibit-list"><li><a href="' + entry.source_url + '" target="_blank" rel="noopener">' + entry.source_name + '</a></li></ul>' : '<div class="field-label">Source</div><div class="field-value" style="color:var(--ink-faint);font-style:italic;">not cited in original post</div>');
  }
  if (cfg.kind === "govservices") {
    return '<div class="field-label">Institution</div><div class="field-value">' + (entry.institution || "") + '</div>' +
      '<div class="field-label">What changed</div><div class="field-value">' + (entry.what_changed || "") + '</div>' +
      '<div class="field-label">Primary proponent</div><div class="field-value"><strong>' + (entry.primary_proponent?.name || "") + '</strong> — ' + (entry.primary_proponent?.role || "") + (entry.primary_proponent?.note ? '<br><em>' + entry.primary_proponent.note + '</em>' : '') + '</div>' +
      '<div class="field-label">Estimated impact</div><div class="field-value">' + (entry.estimated_impact?.summary || "") + '</div>' +
      (entry.estimated_impact?.figures?.length ? '<ul class="exhibit-list">' + entry.estimated_impact.figures.map(f => '<li>' + f.metric + ': <strong>' + f.value + '</strong> (' + f.source + ')</li>').join("") + '</ul>' : '') +
      (entry.estimated_impact?.caveat ? '<div class="field-label">Caveat</div><div class="field-value" style="font-style:italic;">' + entry.estimated_impact.caveat + '</div>' : '') +
      '<div class="field-label">Confidence note</div><div class="confidence-box">' + (entry.confidence_note || "") + '</div>' +
      '<div class="field-label">Sources</div><ul class="exhibit-list">' + (entry.sources || []).map(s => '<li><a href="' + s.url + '" target="_blank" rel="noopener">' + s.name + '</a></li>').join("") + '</ul>';
  }
  // prosecution (default)
  return '<div class="field-label">Violation Type</div><div class="field-value">' + (entry.offense_category || "") + '</div>' +
    '<div class="field-label">Status Stage</div><div class="field-value">' + (entry.status_category || "") + '</div>' +
    '<div class="field-label">Alleged Violation (full legal citation)</div><div class="field-value">' + (entry.offense_category_raw || entry.offense_category || "") + '</div>' +
    '<div class="field-label">Incident summary</div><div class="field-value">' + (entry.incident_summary || "") + '</div>' +
    '<div class="field-label">Status</div><div class="field-value">' + (entry.status || "") + '</div>' +
    '<div class="field-label">Confidence note</div><div class="confidence-box">' + (entry.confidence_note || "") + '</div>';
}

/* Shared card builder used by both the per-tracker tabbed view and
   the cross-database global search view, so the two stay visually
   and behaviorally consistent rather than drifting apart. */
function buildEntryCard(entry, cfg, docketLabel, sourceLabel, term, useRegex) {
  const div = document.createElement("div");
  div.className = "entry";
  const rawTitle = entry[cfg.titleField] || "Untitled";
  const title = cfg.kind === "tracker" ? truncate(rawTitle, 110) : rawTitle;
  // Highlights the active search term in the free-text fields most
  // likely to contain it (title, summary, category labels) -- dates
  // and domain tags are left alone since they're never what matched.
  const hl = (text) => highlightMatches(text || "", term, useRegex);

  let metaHtml = sourceLabel ? '<span class="source-tag">' + sourceLabel + '</span>' : "";
  if (cfg.kind === "deregulation") {
    metaHtml += '<span class="domain-tag" style="background:' + domainColor(entry.domain) + '22; color:' + domainColor(entry.domain) + '">' + entry.domain + '</span>' +
               '<span>' + hl(entry.agency) + '</span><span>' + (entry.date_of_action || "") + '</span>' +
               '<span>' + hl(entry.short_summary || truncate(entry.what_changed || "", 100)) + '</span>';
  } else if (cfg.kind === "tracker") {
    metaHtml += '<span>' + (entry.date || "") + '</span>';
  } else if (cfg.kind === "govservices") {
    metaHtml += '<span class="domain-tag" style="background:' + domainColor(entry.domain) + '22; color:' + domainColor(entry.domain) + '">' + govservicesDomainLabel(entry.domain) + '</span>' +
               '<span>' + hl(entry.institution) + '</span><span>' + (entry.date_of_action || "") + '</span>';
  } else {
    metaHtml += '<span>' + hl(entry.offense_category) + '</span><span>' + hl(entry.status_category) + '</span><span>updated ' + (entry.last_updated || "") + '</span>';
  }

  div.innerHTML =
    '<div class="entry-head">' +
      '<div class="entry-title-block">' +
        '<p class="entry-title">' + hl(title) + '</p>' +
        '<div class="entry-meta">' + metaHtml + '</div>' +
      '</div>' +
    '</div>' +
    '<div class="entry-detail">' + buildDetailHtml(entry, cfg) + '</div>';

  div.querySelector(".entry-head").addEventListener("click", () => div.classList.toggle("open"));
  return div;
}

function renderTabs() {
  const nav = document.getElementById("tabs");
  nav.innerHTML = "";
  Object.keys(TRACKERS).forEach(key => {
    const btn = document.createElement("button");
    btn.textContent = TRACKERS[key].label + " (" + TRACKERS[key].data.length + ")";
    btn.className = key === activeTracker ? "active" : "";
    btn.onclick = () => { activeTracker = key; filterValue = ""; searchTerm = ""; document.getElementById("search").value = ""; renderDispatch(); };
    nav.appendChild(btn);
  });
}

function pluralize(word) {
  if (word.endsWith("y") && !/[aeiou]y$/i.test(word)) {
    return word.slice(0, -1) + "ies";
  }
  if (/(s|x|ch|sh)$/i.test(word)) {
    return word + "es";
  }
  return word + "s";
}

function renderFilterOptions(cfg) {
  const sel = document.getElementById("filter");
  if (!cfg.filterField) { sel.style.display = "none"; return; }
  sel.style.display = "";
  let values;
  if (cfg.kind === "tracker") {
    // Curated, fixed order -- not derived from raw data, since raw
    // category values have format drift and occasional scraper bugs.
    // Only show categories that actually have at least one entry.
    const present = new Set(cfg.data.map(e => e[cfg.filterField]).filter(Boolean));
    values = CANONICAL_CATEGORY_ORDER.filter(c => present.has(c));
  } else {
    values = [...new Set(cfg.data.map(e => e[cfg.filterField]).filter(Boolean))].sort();
  }
  sel.innerHTML = '<option value="">all ' + pluralize(cfg.filterLabel) + '</option>' +
    values.map(v => '<option value="' + v + '">' + (cfg.kind === "govservices" ? govservicesDomainLabel(v) : v) + '</option>').join("");
  sel.value = filterValue;
}

function renderEntries() {
  const cfg = TRACKERS[activeTracker];
  const container = document.getElementById("entries");
  const countEl = document.getElementById("count");

  const filtered = cfg.data.filter(e => {
    const matchesSearch = matchesTerm(JSON.stringify(e).toLowerCase(), searchTerm, false);
    const matchesFilter = !filterValue || e[cfg.filterField] === filterValue;
    return matchesSearch && matchesFilter;
  });

  // Prioritization lives inside the browse tabs themselves -- every
  // tab's entries are sorted by the same impact heuristic used
  // elsewhere, whether or not a search/filter is active. No separate
  // "top priorities" section needed. Government Service Redirection
  // is the exception -- sorted reverse-chronologically by date of
  // action instead, since this tracker updates frequently and recency
  // is the more useful default ordering for it. date_of_action here
  // is often a compound string ("2025-03 (initial cuts) through
  // 2026-04 (ongoing)") that native Date.parse cannot handle at all
  // (returns NaN on the whole string) -- extractFirstDate() pulls out
  // just the first YYYY-MM or YYYY-MM-DD substring instead.
  if (cfg.kind === "govservices") {
    filtered.sort((a, b) => extractFirstDate(b.date_of_action) - extractFirstDate(a.date_of_action));
  } else {
    filtered.sort((a, b) => impactScore(b, cfg) - impactScore(a, cfg));
  }

  // Safety valve: even a successful search can still match thousands
  // of entries (e.g. a common word against 12,000+ News entries) --
  // cap what's actually rendered so the page doesn't choke, and be
  // explicit that there are more matches than are shown.
  const RENDER_CAP = 300;
  const toRender = filtered.slice(0, RENDER_CAP);

  countEl.textContent = filtered.length > RENDER_CAP
    ? toRender.length + " shown of " + filtered.length + " entries — search or filter to narrow further"
    : filtered.length + " of " + cfg.data.length + " entries shown";

  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty-state">No entries match. Try a different search or filter.</div>';
    return;
  }

  container.innerHTML = "";
  toRender.forEach((entry, i) => {
    container.appendChild(buildEntryCard(entry, cfg, "NO. " + String(i + 1).padStart(2, "0"), null, searchTerm, false));
  });
}

/* Cross-database search: iterates every tracker's data (News is
   flattened per-event, not per-post, once real data is wired in --
   see flattenTrackerPosts()), applies plain or regex matching, and
   renders either full docket cards or a condensed one-liner list
   depending on the "1-liners" toggle. */
/* Builds the "N more matches in Reporting" callout shown above global
   search results. Reporting is excluded from the merged results below
   because at 500+ entries -- an order of magnitude more than the three
   curated trackers combined -- it would otherwise flood the list; this
   link is the way back to it, landing on Reporting's own tab with its
   own independent search box pre-filled with the same term. */
function buildReportingLink(term, count) {
  if (!count) return null;
  const p = document.createElement("p");
  p.className = "reporting-link";
  const a = document.createElement("a");
  a.href = "#";
  a.textContent = count + " more match" + (count === 1 ? "" : "es") + " in Reporting →";
  a.addEventListener("click", (e) => {
    e.preventDefault();
    jumpToReportingSearch(term);
  });
  p.appendChild(a);
  return p;
}

/* Leaves global-search mode entirely and lands on the Reporting tab
   with its own per-tracker search box carrying over the same term --
   reuses the existing tab/search-box machinery rather than building a
   second results renderer. */
function jumpToReportingSearch(term) {
  document.getElementById("global-search").value = "";
  activeTracker = "tracker";
  filterValue = "";
  searchTerm = term;
  document.getElementById("search").value = term;
  document.getElementById("filter").value = "";
  renderDispatch();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function renderGlobalResults(term, useRegex, useOneLiners, useImpactSort) {
  const container = document.getElementById("entries");
  const countEl = document.getElementById("count");
  const errorEl = document.getElementById("regex-error");
  errorEl.textContent = "";

  let allMatches = [];
  let hadRegexError = false;

  // Reporting is deliberately excluded here -- see buildReportingLink()
  // above for why -- and searched separately below just for its count.
  Object.keys(TRACKERS).forEach(key => {
    if (key === "tracker") return;
    const cfg = TRACKERS[key];
    cfg.data.forEach(entry => {
      const haystack = JSON.stringify(entry);
      const result = matchesTerm(haystack, term, useRegex);
      if (result === null) { hadRegexError = true; return; }
      if (result) allMatches.push({ entry, cfg, sourceLabel: cfg.label });
    });
  });

  if (hadRegexError) {
    errorEl.textContent = "Invalid regular expression — showing no results until the pattern is fixed.";
    container.innerHTML = "";
    countEl.textContent = "";
    return;
  }

  // Always plain-text matching here, regardless of the regex toggle --
  // Reporting's own tab search box doesn't support regex, so this count
  // needs to match what actually shows up after following the link.
  const reportingMatchCount = TRACKERS.tracker.data.filter(entry =>
    matchesTerm(JSON.stringify(entry), term, false)
  ).length;
  const reportingLink = buildReportingLink(term, reportingMatchCount);

  if (useImpactSort) {
    allMatches.sort((a, b) => impactScore(b.entry, b.cfg) - impactScore(a.entry, a.cfg));
  }

  countEl.textContent = allMatches.length + " result(s) across 3 databases for \"" + term + "\"" +
    (useRegex ? " (regex)" : "") + (useOneLiners ? " — 1-liner view" : "");

  container.innerHTML = "";

  if (allMatches.length === 0) {
    const empty = document.createElement("div");
    empty.className = "empty-state";
    empty.textContent = "No matches in Corporate Deregulation, Cabinet-Level Legal Exposure, or Government Service Redirection.";
    container.appendChild(empty);
    if (reportingLink) container.appendChild(reportingLink);
    return;
  }

  // Safety valve: a broad term could still match hundreds of entries
  // across the three curated trackers -- cap what's actually rendered
  // so the page doesn't choke, and be explicit that there are more.
  const RENDER_CAP = 300;
  const overCap = allMatches.length > RENDER_CAP;
  const toRender = allMatches.slice(0, RENDER_CAP);
  if (overCap) {
    countEl.textContent = toRender.length + " shown of " + allMatches.length + " results — refine your search to narrow further";
  }

  if (reportingLink) container.appendChild(reportingLink);

  if (!useOneLiners) {
    toRender.forEach((m, i) => {
      const card = buildEntryCard(m.entry, m.cfg, "NO. " + String(i + 1).padStart(2, "0"), m.sourceLabel, term, useRegex);
      container.appendChild(card);
    });
    return;
  }

  // --- one-liner list mode ---
  const list = document.createElement("div");
  list.className = "oneliner-list";
  toRender.forEach((m, i) => {
    const row = document.createElement("div");
    row.className = "oneliner-row";
    row.innerHTML =
      '<span class="oneliner-caret">▸</span>' +
      '<span class="oneliner-text"><span class="source-tag">' + m.sourceLabel + '</span>' + highlightMatches(oneLinerFor(m.entry, m.cfg), term, useRegex) + '</span>';

    const detail = document.createElement("div");
    detail.className = "oneliner-detail";
    detail.innerHTML = buildDetailHtml(m.entry, m.cfg);

    row.addEventListener("click", () => {
      row.classList.toggle("open");
      detail.style.display = row.classList.contains("open") ? "block" : "none";
    });

    list.appendChild(row);
    list.appendChild(detail);
  });
  container.appendChild(list);
}

/* Top-level dispatcher: global search (if non-empty) takes over the
   whole results area and hides the per-tracker tabs/controls, since
   showing both search modes active at once would be confusing about
   which one is actually filtering what's on screen. */
function renderDispatch() {
  const term = document.getElementById("global-search").value.trim();
  const useRegex = document.getElementById("global-regex").checked;
  const useOneLiners = document.getElementById("global-oneliner").checked;
  const useImpactSort = true; // always sorted by impact now -- no toggle
  const tabsEl = document.getElementById("tabs");
  const controlsEl = document.getElementById("tab-controls");
  const browseLabelEl = document.getElementById("browse-instead");

  if (term) {
    tabsEl.style.display = "none";
    controlsEl.style.display = "none";
    browseLabelEl.style.display = "none";
    renderGlobalResults(term, useRegex, useOneLiners, useImpactSort);
  } else {
    tabsEl.style.display = "";
    controlsEl.style.display = "";
    browseLabelEl.style.display = "";
    document.getElementById("regex-error").textContent = "";
    renderTabs();
    renderFilterOptions(TRACKERS[activeTracker]);
    renderEntries();
  }
}

document.getElementById("search").addEventListener("input", (e) => {
  searchTerm = e.target.value;
  renderEntries();
});
document.getElementById("filter").addEventListener("change", (e) => {
  filterValue = e.target.value;
  renderEntries();
});
document.getElementById("global-search").addEventListener("input", renderDispatch);
document.getElementById("global-regex").addEventListener("change", renderDispatch);
document.getElementById("global-oneliner").addEventListener("change", renderDispatch);

/* Floating nav actions: Back to Top just scrolls; Start Over resets
   every piece of search/filter state to the fresh-load default
   (activeTracker back to "deregulation", the actual initial value
   above) so the page looks exactly like a first visit. */
document.getElementById("back-to-top-btn").addEventListener("click", () => {
  window.scrollTo({ top: 0, behavior: "smooth" });
});

document.getElementById("start-over-btn").addEventListener("click", () => {
  document.getElementById("global-search").value = "";
  document.getElementById("global-regex").checked = false;
  document.getElementById("global-oneliner").checked = false;
  document.getElementById("search").value = "";
  document.getElementById("filter").value = "";
  activeTracker = "deregulation";
  searchTerm = "";
  filterValue = "";
  renderDispatch();
  window.scrollTo({ top: 0, behavior: "smooth" });
});

/* Loads the three published JSON files. Uses Promise.allSettled
   (not Promise.all) so that a failure on one file -- missing,
   malformed, not yet published -- doesn't prevent the other two
   databases from working. Tracker data is flattened from raw posts
   into individually searchable events immediately after loading. */
async function loadAllData() {
  document.getElementById("entries").innerHTML = '<div class="empty-state">Loading data\u2026</div>';

  const [prosecutionResult, deregulationResult, trackerResult, govservicesResult] = await Promise.allSettled([
    fetch("data/prosecution.json").then(r => { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); }),
    fetch("data/deregulation.json").then(r => { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); }),
    fetch("data/tracker.json").then(r => { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); }),
    fetch("data/government-services.json").then(r => { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); }),
  ]);

  const loadErrors = [];

  if (prosecutionResult.status === "fulfilled") {
    TRACKERS.prosecution.data = prosecutionResult.value;
    TRACKERS.prosecution.data.forEach(e => {
      e.offense_category_raw = e.offense_category;
      e.offense_category = classifyOffenseCategory(e.offense_category);
      e.status_category = classifyStatus(e.status);
    });
  } else {
    loadErrors.push("prosecution.json (" + prosecutionResult.reason.message + ")");
  }

  if (deregulationResult.status === "fulfilled") {
    TRACKERS.deregulation.data = deregulationResult.value;
  } else {
    loadErrors.push("deregulation.json (" + deregulationResult.reason.message + ")");
  }

  if (trackerResult.status === "fulfilled") {
    const flattened = flattenTrackerPosts(trackerResult.value);
    flattened.forEach(e => { e.category = normalizeCategory(e.category); });
    // These categories are excluded entirely from Reporting -- not
    // just hidden from the filter dropdown, but removed from
    // browsing, search, and global search everywhere in the site.
    const EXCLUDED_TRACKER_CATEGORIES = new Set(["Announcement", "White Supremacist", "Uncategorized", "Other"]);
    TRACKERS.tracker.data = flattened.filter(e => !EXCLUDED_TRACKER_CATEGORIES.has(e.category));
  } else {
    loadErrors.push("tracker.json (" + trackerResult.reason.message + ")");
  }

  if (govservicesResult.status === "fulfilled") {
    TRACKERS.govservices.data = govservicesResult.value;
  } else {
    loadErrors.push("government-services.json (" + govservicesResult.reason.message + ")");
  }

  renderDispatch();

  if (loadErrors.length) {
    const banner = document.createElement("div");
    banner.className = "regex-error";
    banner.style.margin = "0 auto 1rem";
    banner.style.maxWidth = "880px";
    banner.style.textAlign = "left";
    banner.textContent = "Could not load: " + loadErrors.join(", ") + ". Other databases are unaffected.";
    document.querySelector("main").prepend(banner);
    console.warn("Data load errors:", loadErrors);
  }
}

loadAllData();
</script>
<script data-goatcounter="https://claimcheck.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</body>
